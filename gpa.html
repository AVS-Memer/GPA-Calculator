<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GPA Calculator | The AVS Site</title>
    <link rel="icon" type="image/x-icon" href="/Data/Images/Icons/AVS.jpeg">
    <link href="Stylesheets/gpa.css" rel="stylesheet" type="text/css"/>
  </head>
  <body>
    <div class="container">
      <h1>Weighted GPA Calculator</h1>
      <div class="card">
        <div class="card">
          <h2>All Course GPA</h2>
          <div class="gpa" id="allCourseGPA">--</div>
          <div id="allCourseCredits">Credits: --</div>
        </div>
        <div class="card">
          <h2>Core GPA</h2>
          <div class="gpa" id="coreGPA">--</div>
          <div id="coreCredits">Credits: --</div>
        </div>
        <div class="card">
          <h2>Included Courses</h2>
          <div id="courses"></div>
        </div>
      </div>
    </div>
    <script src="Scripts/gpaCalculator.js"></script>
    <script src="Scripts/gpa.js"></script>
  </body>
</html>
