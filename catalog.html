<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GPA Calculator | The AVS Site</title>
    <link rel="icon" type="image/x-icon" href="/Data/Images/Icons/AVS.jpeg">
    <link href="Stylesheets/style.css" rel="stylesheet" type="text/css"/>
  </head>
  <body>
    <div class="container">
      <h1>Course Catalog</h1>
    
      <div class="card">
        <input id="search" placeholder="Search courses..." oninput="filterCourses()">
        <br><br>
        <select id="levelFilter" onchange="filterCourses()">
          <option value="">All Levels</option>
          <option value="CP">CP</option>
          <option value="Honors">Honors</option>
          <option value="AP">AP</option>
        </select>
        
        <div class="count" id="count"></div>
        
        <table>
          <thead>
            <tr>
              <th>Department</th>
              <th>Level</th>
              <th>ID</th>
              <th>Course</th>
              <th>Credits</th>
              <th>Duration</th>
              <th>Max GPA</th>
            </tr>
          </thead>
          <tbody id="courseTable"></tbody>
        </table>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="Scripts/Catalog.js"></script>
  </body>
</html>
